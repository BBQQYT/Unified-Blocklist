name: Auto Update Blocklist

on:
  schedule:
    - cron: '0 3 * * *' # Запуск каждый день в 03:00 UTC
  workflow_dispatch: # Позволяет запускать вручную кнопкой в интерфейсе GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        run: python update.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add domains.txt hosts.txt
          
          if git diff --staged --quiet; then
            echo "Изменений нет, коммитить нечего."
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S' UTC)"
            git push
          fi
